name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        # Publicamos en una carpeta simple llamada "out"
        run: dotnet publish -c Release -o out

      - name: Find and Fix index.html
        run: |
          # Buscamos donde sea que esté el index.html (o cualquier .html) y lo movemos a la raíz de 'out'
          target_file=$(find out -name "index.html" | head -n 1)
          if [ -z "$target_file" ]; then
            target_file=$(find out -name "*.html" | head -n 1)
          fi
          
          echo "Archivo encontrado en: $target_file"
          cp "$target_file" out/index.html
          
          # Aplicamos el cambio al archivo que acabamos de copiar
          sed -i 's|<base href="/" />|<base href="/portafolioweb/" />|g' out/index.html
          
          # Creamos el archivo .nojekyll en la raíz de salida
          touch out/.nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Subimos TODO lo que esté en 'out'
          branch: gh-pages