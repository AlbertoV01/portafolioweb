name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Cambia a 'master' si esa es tu rama principal

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código
      - uses: actions/checkout@v4

      # 2. Configurar el SDK de .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Publicar el proyecto (Genera los archivos estáticos)
      - name: Publish .NET Core Project
        run: dotnet publish PortfolioW.csproj -c Release -o release --nologo

      # 4. Cambiar el <base href="/" /> por el nombre del repo para que carguen los estilos
      # REEMPLAZA 'PortfolioW' por el nombre exacto de tu repositorio en GitHub
      - name: Change base-tag in index.html from / to portafolioweb
        run: sed -i 's/<base href="\/" \/>/<base href="\/portafolioweb\/" \/>/g' release/wwwroot/index.html

      # 5. Copiar index.html a 404.html para soportar navegación directa
      - name: copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # 6. Crear el archivo .nojekyll para evitar que GitHub ignore carpetas con "_"
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      # 7. Subir los archivos a la rama gh-pages
      - name: Commit and Push to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # La rama donde se guardará el sitio web
          folder: release/wwwroot # Carpeta que contiene los archivos finales