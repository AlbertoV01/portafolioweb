name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        run: dotnet publish -c Release -o out

      - name: Create index.html and Fix Routes
        run: |
          cd out/wwwroot
          
          # Detectamos el nombre del archivo CSS principal (que suele ser NombreProyecto.styles.css)
          CSS_FILE=$(find css -name "*.css" | head -n 1)
          # Si no hay carpeta CSS, buscamos en la raíz de wwwroot
          if [ -z "$CSS_FILE" ]; then CSS_FILE=$(find . -name "*.styles.css" | head -n 1); fi

          echo "Detectado CSS: $CSS_FILE"

          # Creamos el index.html inyectando el base href exacto de tu repo
          echo '<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Portafolio</title>
              <base href="/portafolioweb/" />
              <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
              <link rel="stylesheet" href="css/app.css" />
              <link rel="icon" type="image/png" href="favicon.png" />
          </head>
          <body>
              <div id="app">Cargando...</div>
              <script src="_framework/blazor.webassembly.js"></script>
          </body>
          </html>' > index.html
          
          touch .nojekyll
          
          # Verificación final de rutas en el log
          ls -R

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/wwwroot
          branch: gh-pages