name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write # Permiso crucial para que GitHub pueda crear la rama gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        # Usamos -c Release y nos aseguramos de que se limpie antes
        run: dotnet publish -c Release -o release

      - name: Fix base-path (Auto-detect)
        # Este comando busca el archivo index.html en cualquier subcarpeta de 'release' y lo modifica
        run: |
          find release -name "index.html" -exec sed -i 's|base href="/"|base href="/portafolioweb/"|g' {} +
          find release -name "index.html" -exec sed -i 's|base href="/"|base href="/portafolioweb/"|g' {} +

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll || touch release/.nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot # Si falla aquí, prueba cambiando a solo: release
          branch: gh-pages