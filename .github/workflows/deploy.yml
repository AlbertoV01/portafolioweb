name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        # Publicamos específicamente el proyecto del lado del cliente
        run: dotnet publish -c Release -o out

      - name: Generate Index.html for GitHub
        run: |
          # En .NET 8 Web App, el archivo de salida se suele llamar 'wwwroot/_framework/blazor.webassembly.js'
          # pero GitHub necesita un 'index.html' en la raíz. 
          # Buscamos el archivo generado (que suele estar en out/wwwroot)
          
          cd out/wwwroot
          # Si no existe index.html, lo creamos o renombramos el que exista
          if [ ! -f index.html ]; then
            cp $(find . -name "*.html" | head -n 1) index.html || echo "No HTML found"
          fi
          
          # Corrección del base href
          sed -i 's|<base href="/" />|<base href="/portafolioweb/" />|g' index.html
          
          # Crear .nojekyll para que GitHub no bloquee carpetas con guion bajo (_)
          touch .nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/wwwroot
          branch: gh-pages