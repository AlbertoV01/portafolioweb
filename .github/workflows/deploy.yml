name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        # Si tu carpeta de proyecto cliente se llama distinto, cámbialo aquí:
        run: dotnet publish -c Release -o out

      - name: Create index.html if missing
        run: |
          # Entramos a la carpeta de salida
          cd out/wwwroot
          
          # Si NO hay un index.html (común en .NET 8 Web App), lo creamos desde cero
          if [ ! -f index.html ]; then
            echo '<!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>Portafolio</title>
                <base href="/portafolioweb/" />
                <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
                <link rel="stylesheet" href="css/app.css" />
                <link rel="icon" type="image/png" href="favicon.png" />
            </head>
            <body>
                <div id="app">Cargando...</div>
                <div id="blazor-error-ui">
                    An unhandled error has occurred.
                    <a href="" class="reload">Reload</a>
                    <a class="dismiss">🗙</a>
                </div>
                <script src="_framework/blazor.webassembly.js"></script>
            </body>
            </html>' > index.html
          else
            # Si ya existía, solo corregimos el base href
            sed -i 's|<base href="/" />|<base href="/portafolioweb/" />|g' index.html
          fi
          
          touch .nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/wwwroot
          branch: gh-pages