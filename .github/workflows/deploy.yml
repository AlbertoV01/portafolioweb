name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        run: dotnet publish -c Release -o out

      - name: Create and Fix Index
        run: |
          cd out/wwwroot
          # 1. Crear el index.html limpio (Ajusta los nombres de tus CSS si son distintos)
          echo '<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Portafolio</title>
              <base href="/portafolioweb/" />
              <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
              <link rel="stylesheet" href="css/app.css" />
              <link rel="icon" type="image/png" href="favicon.png" />
          </head>
          <body>
              <div id="app">Cargando...</div>
              <script src="_framework/blazor.webassembly.js"></script>
          </body>
          </html>' > index.html

          # 2. IMPORTANTE: Asegúrate de que el nombre del repo arriba sea EXACTO al de GitHub
          
          # 3. Forzar el .nojekyll
          touch .nojekyll
          
          # 4. Ver los primeros archivos para confirmar en el log
          ls -R

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out/wwwroot
          branch: gh-pages