name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Se activa al subir cambios a main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        # Forzamos la creación de la carpeta release
        run: dotnet publish -c Release -o release

      - name: Debug - List files
        # Esto nos dirá en el log de GitHub si el archivo index.html realmente existe ahí
        run: ls -R release/wwwroot

      - name: Fix base-path
        # Cambiamos el comando para que sea más flexible con las comillas
        run: sed -i 's|base href="/"|base href="/portafolioweb/"|g' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages