name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        run: dotnet publish -c Release -o release

      - name: Fix base-path and index
        run: |
          # 1. Buscamos cualquier .html que actúe como entrada y lo renombramos a index.html si no existe
          find release/wwwroot -name "*.html" -exec cp {} release/wwwroot/index.html \;
          
          # 2. Aplicamos el cambio de base href al index.html
          sed -i 's|<base href="/" />|<base href="/portafolioweb/" />|g' release/wwwroot/index.html
          
          # 3. Verificamos que el archivo exista para que el log nos confirme
          ls -la release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages